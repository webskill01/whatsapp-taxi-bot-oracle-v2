<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>My Bot</title>
<style>
  :root {
    --bg:#0b0d12; --bg2:#0f1219; --card:#161a22; --card2:#1b2029; --line:#262c38;
    --txt:#e8eaf0; --muted:#8b93a3; --grn:#34d399; --red:#f87171; --amber:#fbbf24; --accent:#6366f1;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(1000px 500px at 50% -10%, #161b2e 0%, var(--bg) 55%);
    color:var(--txt); min-height:100dvh; padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap { padding:16px; max-width:540px; margin:0 auto; }
  .card { background:linear-gradient(180deg,var(--card),var(--bg2)); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px; }
  h1 { font-size:19px; margin:0 0 6px; display:flex; align-items:center; gap:9px; }
  h2 { font-size:13px; margin:0 0 4px; font-weight:600; }
  .badge { font-size:10px; padding:3px 10px; border-radius:20px; text-transform:uppercase; font-weight:600; }
  .on { background:rgba(52,211,153,.14); color:var(--grn); }
  .off { background:rgba(248,113,113,.14); color:var(--red); }
  .warnb { background:rgba(251,191,36,.16); color:var(--amber); }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.on { background:var(--grn); box-shadow:0 0 8px var(--grn); } .dot.off { background:var(--red); }
  button { background:var(--card2); color:var(--txt); border:1px solid var(--line); padding:13px 14px; border-radius:12px; cursor:pointer; font-size:14px; font-weight:550; width:100%; margin-top:9px; transition:.12s; }
  button:active { transform:scale(.98); }
  button.danger { border-color:#5b2b2b; color:#fca5a5; }
  button.go { border-color:#235241; color:#86efac; }
  .row2 { display:flex; gap:9px; } .row2 button { width:50%; }
  input { background:#0c0f16; border:1px solid var(--line); color:var(--txt); padding:13px; border-radius:12px; font-size:14px; width:100%; outline:none; }
  input:focus { border-color:var(--accent); }
  .muted { color:var(--muted); font-size:13px; }
  #qr img { width:min(280px,76vw); border-radius:12px; margin-top:10px; }
  .grp { display:flex; justify-content:space-between; gap:10px; padding:11px; border:1px solid var(--line); border-radius:11px; margin-top:9px; align-items:center; background:var(--bg2); }
  .grp.disabled { border-color:#5b2b2b; }
  .gname { font-size:13px; font-weight:550; }
  .gid { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--muted); word-break:break-all; margin-top:2px; }
  .grp button { width:auto; margin:0; padding:9px 12px; font-size:12px; }
  .divider { border:none; border-top:1px solid var(--line); margin:14px 0 10px; }
  dialog { background:var(--card); color:var(--txt); border:1px solid var(--line); border-radius:16px; max-width:540px; width:94%; padding:0; }
  dialog::backdrop { background:rgba(0,0,0,.66); }
  .dlg-head { padding:16px 16px 8px; display:flex; justify-content:space-between; align-items:center; }
  .dlg-body { padding:0 16px 18px; max-height:72dvh; overflow:auto; }
  .dlg-head button, .dlg-body .grp button { width:auto; margin:0; padding:8px 12px; font-size:12px; }
  .statline { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .stathd { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:14px 0 6px; font-weight:600; }
  .statgrid { display:grid; grid-template-columns:1fr auto; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:11px; overflow:hidden; }
  .statk { background:var(--bg2); padding:10px 12px; font-size:13px; color:var(--muted); }
  .statv { background:var(--bg2); padding:10px 12px; font-size:13px; font-weight:600; text-align:right; font-variant-numeric:tabular-nums; }
  #toast { position:fixed; left:50%; bottom:calc(18px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(8px); background:#1f2430; border:1px solid var(--line); padding:11px 16px; border-radius:11px; opacity:0; transition:.22s; z-index:50; max-width:90vw; font-size:13px; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1 id="botName">My Bot</h1>
    <div id="statusLine" class="muted">Loading…</div>
  </div>

  <div class="card">
    <h2>Controls</h2>
    <button id="pauseBtn" onclick="openPauseMenu()">⏸ Pause sharing…</button>
    <div class="row2">
      <button class="go" onclick="doAct('restart','Restart your bot now?')">↻ Restart</button>
      <button id="stopBtn" class="danger" onclick="toggleStop()">⏹ Stop</button>
    </div>
    <div class="row2">
      <button onclick="showStats()">📊 Stats</button>
      <button onclick="showQR()">📱 Show QR</button>
    </div>
    <button class="danger" onclick="doAct('reset','Log out and start fresh? You will need to scan a new QR.')">⚠ Reset + QR (fix a corrupted login)</button>
    <div id="qr" style="text-align:center"></div>
  </div>

  <div class="card">
    <h2>Report a spam number</h2>
    <div class="muted">Adds to the shared block list for every bot. Duplicates are skipped automatically.</div>
    <div class="muted" id="blockCount" style="margin-top:6px">—</div>
    <input id="numIn" placeholder="e.g. 98765 43210 or +91…" style="margin-top:10px" />
    <button class="go" onclick="submitBlock()">Add to block list</button>
  </div>
</div>

<dialog id="pauseDlg">
  <div class="dlg-head"><strong>Sharing</strong><button onclick="pauseDlg.close()">✕</button></div>
  <div class="dlg-body" id="pauseBody"></div>
</dialog>
<dialog id="statsDlg">
  <div class="dlg-head"><strong id="statsTitle">Stats</strong><button onclick="statsDlg.close()">✕</button></div>
  <div class="dlg-body" id="statsBody"></div>
</dialog>
<div id="toast"></div>

<script>
const token = new URLSearchParams(location.search).get("token") || "";
const H = { "x-token": token, "Content-Type": "application/json" };
const api = (p, opt={}) => fetch(p + (p.includes("?")?"&":"?") + "token=" + token, opt).then(r=>r.json());
const post = (p, body) => api(p, { method:"POST", headers:H, body:JSON.stringify(body||{}) });
let BOT=null, paused=false, qrTimer=null;
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2400); }
const esc = (s)=>String(s).replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));

async function load(){
  const r = await api("/api/bots");
  if (r.error || !r.bots?.length){ document.getElementById("statusLine").innerHTML = `<span class="off">${esc(r.error||'No bot for this link')}</span>`; return; }
  BOT = r.bots[0]; paused = BOT.runtime?.paused;
  const dis = (BOT.runtime?.disabledTargets||[]).length;
  document.getElementById("botName").innerHTML = `🤖 ${esc(BOT.id)}`;
  const online = BOT.pm2.status === "online";
  document.getElementById("statusLine").innerHTML =
    `<span class="dot ${online?'on':'off'}"></span> <span class="badge ${online?'on':'off'}">${esc(BOT.pm2.status)}</span> ${paused?'<span class="badge warnb">paused</span>':''} ${dis?`<span class="badge warnb">${dis} group off</span>`:''}`;
  const pb = document.getElementById("pauseBtn");
  pb.textContent = paused ? "▶ Sharing paused — manage…" : dis ? `⏸ Sharing (${dis} off)…` : "⏸ Pause sharing…";
  pb.className = (paused||dis) ? "go" : "";
  const sb = document.getElementById("stopBtn");
  sb.textContent = online ? "⏹ Stop" : "▶ Start";
  sb.className = online ? "danger" : "go";
  loadCounts();
}
function toggleStop(){
  const online = BOT?.pm2?.status === "online";
  if (online) doAct('stop','Stop your bot? It goes offline until you Start it again.');
  else doAct('restart','Start your bot now?');
}
async function loadCounts(){
  const r = await api("/api/block/list");
  if (r.counts) document.getElementById("blockCount").textContent =
    `🚫 ${r.counts.blockedPhoneNumbers} spam numbers blocked · ${r.counts.ignoreIfContains} ignore phrases`;
}
async function doAct(action, msg){
  if (!confirm(msg)) return;
  const r = await post(`/api/bot/${BOT.id}/${action}`, {});
  toast(r.message || r.error || "done");
  if (action==='reset') setTimeout(showQR, 4000);
  setTimeout(load, 1500);
}
async function openPauseMenu(){
  const body = document.getElementById("pauseBody");
  body.innerHTML = `
    <div class="grp ${paused?'disabled':''}">
      <div><div class="gname">Entire bot</div><div class="muted">${paused?'Paused — forwarding nothing':'Forwarding active'}</div></div>
      <button class="${paused?'go':'danger'}" onclick="menuPause(${!paused})">${paused?'▶ Resume all':'⏸ Pause all'}</button>
    </div>
    <hr class="divider"/>
    <div class="muted" style="margin-bottom:4px">Or pause a specific group:</div>
    <div id="pt"><div class="muted">Loading groups…</div></div>`;
  pauseDlg.showModal();
  const disabled = new Set(BOT.runtime?.disabledTargets || []);
  const r = await api(`/api/bot/${BOT.id}/groups`);
  const box = document.getElementById("pt"); if (!box) return;
  if (!r.groups){ box.innerHTML = `<div class="muted">${esc(r.error||'Bot offline — only whole-bot pause available')}</div>`; return; }
  const targets = r.groups.filter(g=>g.type==='target');
  if (!targets.length){ box.innerHTML = `<div class="muted">No target groups.</div>`; return; }
  box.innerHTML = targets.map(g=>{
    const off = disabled.has(g.id);
    return `<div class="grp ${off?'disabled':''}">
      <div><div class="gname">${esc(g.name)} ${off?'<span class="badge warnb">off</span>':''}</div><div class="gid">${esc(g.id)}</div></div>
      <button class="${off?'go':'danger'}" onclick="menuTarget('${g.id}',${!off})">${off?'▶ Resume':'⏸ Pause'}</button>
    </div>`;
  }).join("");
}
async function menuPause(p){
  const r = await post(`/api/bot/${BOT.id}/pause`, { paused: p });
  toast(r.error || (p?'Paused':'Resumed')); await load(); openPauseMenu();
}
async function menuTarget(groupId, disabled){
  const r = await post(`/api/bot/${BOT.id}/target`, { groupId, disabled });
  if (r.error){ toast(r.error); return; }
  toast(disabled?'Group sharing paused':'Group sharing resumed'); await load(); openPauseMenu();
}
function statGrid(pairs){
  return `<div class="statgrid">` + pairs.map(([k,v])=>
    `<div class="statk">${esc(k)}</div><div class="statv">${esc(v)}</div>`).join("") + `</div>`;
}
function fmtAgo(iso){
  if (!iso) return "never";
  const ms = Date.now() - Date.parse(iso); if (isNaN(ms)) return "—";
  const m = Math.floor(ms/60000); if (m < 1) return "just now";
  if (m < 60) return m+"m ago"; const h=Math.floor(m/60);
  return h < 24 ? h+"h ago" : Math.floor(h/24)+"d ago";
}
function renderStats(r){
  const s = r.stats || {};
  const fail = s.sendFailures ?? 0, ok = s.sendSuccesses ?? 0, total = ok + fail;
  const head = `<div class="statline">
    <span class="badge ${r.operational?'on':'off'}">${r.operational?'operational':'down'}</span>
    <span class="muted">uptime ${esc(r.uptime||'?')}</span></div>`;
  return head
    + `<div class="stathd">Throughput</div>`
    + statGrid([
        ["Messages processed", s.totalProcessed ?? 0],
        ["Forwarded OK", ok],
        ["Send failures", fail],
        ["Failure rate", total ? ((fail/total)*100).toFixed(1)+"%" : "0%"],
      ])
    + `<div class="stathd">Connection</div>`
    + statGrid([
        ["Reconnects", r.reconnect?.totalReconnects ?? 0],
        ["Last reconnect", fmtAgo(r.reconnect?.lastReconnect)],
      ])
    + `<div class="stathd">Routing</div>`
    + statGrid([
        ["Source groups", r.config?.sourceGroups ?? '—'],
        ["City groups", r.config?.cityGroups ?? '—'],
      ]);
}
let statsTimer = null;
async function showStats(){
  document.getElementById("statsTitle").textContent = (BOT?.id || '') + " · Stats";
  const body = document.getElementById("statsBody");
  body.innerHTML = "<div class='muted'>Fetching stats…</div>"; statsDlg.showModal();
  const tick = async () => {
    const r = await api(`/api/bot/${BOT.id}/stats`);
    if (r.error || !r.stats){ body.innerHTML = `<div class="off">${esc(r.error||'Bot not connected')}</div>`; return; }
    body.innerHTML = renderStats(r);
  };
  await tick(); clearInterval(statsTimer); statsTimer = setInterval(tick, 4000);
}
statsDlg.addEventListener("close", ()=>clearInterval(statsTimer));
async function showQR(){
  const box = document.getElementById("qr");
  box.innerHTML = `<div class="muted">WhatsApp → Linked devices → Link a device</div>
    <img id="qrImg" style="display:none"/>
    <div id="qrNote" class="muted" style="margin-top:8px">Loading QR…</div>
    <button id="qrRefresh" style="margin-top:10px">🔄 Refresh now</button>`;
  const img = box.querySelector("#qrImg"), note = box.querySelector("#qrNote");
  const tick = async () => {
    try {
      const r = await api(`/api/bot/${BOT.id}/qr`);
      if (r.qr){ img.src = r.qr; img.style.display="block"; note.textContent="Scan this QR with WhatsApp"; }
      else if (r.connected){ img.style.display="none"; note.textContent="✅ Connected — no QR needed"; clearInterval(qrTimer); }
      else if (img.src){ note.textContent="Refreshing… waiting for a new QR"; }   // keep last image
      else { note.textContent = esc(r.error || "Bot is starting — waiting for QR…"); }
    } catch { note.textContent = "Reconnecting…"; }
  };
  box.querySelector("#qrRefresh").onclick = tick;
  await tick(); clearInterval(qrTimer); qrTimer = setInterval(tick, 4000);
}
async function submitBlock(){
  const input = document.getElementById("numIn").value.trim(); if(!input) return;
  const r = await post("/api/block/number", { input });
  const p=[]; if(r.added?.length)p.push(`added ${r.added.join(", ")}`);
  if(r.dupes?.length)p.push(`already blocked ${r.dupes.join(", ")}`);
  if(r.invalid?.length)p.push(`invalid ${r.invalid.join(", ")}`);
  toast(p.join(" · ")||"nothing to do"); document.getElementById("numIn").value=""; loadCounts();
}
if (!token) document.getElementById("statusLine").innerHTML = "<span class='off'>Missing ?token= in URL</span>";
else { load(); setInterval(load, 15000); }
</script>
</body>
</html>
